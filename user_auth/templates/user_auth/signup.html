<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<style>
    input{
        width:100%;
        padding: 5px;
    }
    label{
        font-size: 15px;
        font-weight: 700;
    }
</style>

</head>
<body>
    {% for message in messages%}
    <div class="alert alert-{{message.tags}} alert-dismissible fade show" role="alert">
        <strong>Message:</strong>{{message}}
        <button type="button" class="close" data-dismiss="alert" aria-label="close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>
    {%endfor%}
<div class="container d-flex justify-content-center align-items-center flex-column border border-light mt-3 mb-3 p-3 h-75 rounded bg-secondary-subtle">
    <h1 class="mb-3">Sign Up</h1>
    <form action="{% url 'user_auth:signup' %}" method="post" class="border border-light w-50 p-5 rounded bg-light">
        {% csrf_token %}
        <div class="mb-3">
        <label for="username">Username</label>
        <input class="form-control " type="text" name="username" id="username" placeholder="Create your username(only letters and numbers)" 
        name="username" required>
        </div>
    
        <div class="mb-3">
        <label for="first_name">First Name</label>
        <input class="form-control" type="text" name="first_name" id="first_name" placeholder="Enter your first name(only letters)" name="first_name" required> 
        </div>
    
        <div class="mb-3">
        <label for="last_name">Last Name</label>
        <input class="form-control" type="text" name="last_name" id="last_name" placeholder="Enter your last name(only letters)" name="last_name" required>
        </div>
    
        <div class="mb-3">
        <label for="email">Email Address</label>
        <input class="form-control" type="email" name="email" id="email" placeholder="Enter your Email Address" name="email" required>
        </div>
    
        
        <div class="mb-3">
        <label  for="password">Password</label>
        <input class="form-control" type="password" name="password" id="password" placeholder="Create your password" name="password" required>
        </div>
        
        <div class="mb-3">
        <label for="confirm_password">Confirm Password</label>
        <input class="form-control" type="password" name="confirm_password" id="confirm_password" placeholder="Confirm your password" name="confirm_password" required>
        </div>
        
        <button class="w-100 btn btn-primary"  type="submit">Sign Up</button>
    </form>
    </div>
</body>
</html>
