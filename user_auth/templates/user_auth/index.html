<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    {% for message in messages%}
    <div class="alert alert-{{message.tags}} alert-dismissible fade show" role="alert">
        <strong>Message:</strong>{{message}}
        <button type="button" class="close" data-dismiss="alert" aria-label="close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>
    {%endfor%}

    <h1>Welcome to Experteens</h1>
    <!-- if user is logged in -->
    {% if user.is_authenticated%}
    <h2>Hello {{first_name}}</h2>
    <h3>you re successfully logged in</h3>
    <button type="submit"><a href="{% url 'user_auth:signout' %}">SignOut</a></button>

    {% else %}
    <button type="submit"><a href="{% url 'user_auth:signup' %}">SignUp</a></button>
    <button type="submit"><a href="{% url 'user_auth:signin' %}">SignIn</a></button>
    {% endif %}
</body>

</html>
