<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body >
    {% for message in messages%}
    <div class="alert alert-{{message.tags}} alert-dismissible fade show" role="alert">
        <strong>Message:</strong>{{message}}
        <button type="button" class="close" data-dismiss="alert" aria-label="close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>
    {%endfor%}

<div class="container mt-3 d-flex justify-content-center align-items-start bg-secondary-subtle p-5 rounded" >
    <div class="container w-50">
    <h1 class="text-center color-primary">Secure Notes App</h1>
    <h3 class="text-center">Keep your notes safe and private</h3>
    </div>
    <!-- if user is logged in -->
    <!-- {% if user.is_authenticated%}
    <h2>Hello {{first_name}}</h2>
    <h3>you re successfully logged in</h3>
    <button type="submit"><a href="{% url 'user_auth:signout' %}">SignOut</a></button>

    {% else %} -->
    <div class=" container d-flex justify-content-center align-items-center gap-3 flex-column  w-50 pt-3 rounded pb-5 bg-light">
         <form action="{% url 'user_auth:signin' %}" method="post" class="w-50">
        {% csrf_token %}
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Username</label>
    <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" name="username" aria-placeholder="Username" placeholder="Username">
    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Password</label>
    <input type="password" class="form-control" id="exampleInputPassword1" name="password" placeholder="Password">
  </div>
  <div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" id="exampleCheck1">
    <label class="form-check-label" for="exampleCheck1">Remember me</label>
  </div>
  <button type="submit" class="btn btn-primary w-100">SignIn</button>
</form>
<div class="w-100 d-flex justify-content-center align-items-center flex-column mt-5">
<p>Don't have an account?</p>
<button type="submit" class="btn btn-primary w-50"><a href="{% url 'user_auth:signup' %}" class="text-white" style="text-decoration: none;">Create new account</a></button>
    </div>
    </div>
</div>
    {% endif %}
</body>

</html>
