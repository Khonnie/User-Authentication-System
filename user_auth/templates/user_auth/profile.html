<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notes App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      overflow-x: hidden;
      background: #f8f9fa;
    }

    .sidebar {
      height: 100vh;
      background-color: #343a40;
      color: white;
    }

    .sidebar a {
      color: #ddd;
      text-decoration: none;
      display: block;
      padding: 10px;
      border-radius: 6px;
    }

    .sidebar a:hover {
      background-color: #495057;
      color: white;
    }
  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <div class="col-md-3 col-lg-2 sidebar d-flex flex-column p-3">

      <h4 class="text-white">My Notes</h4>
      <hr>

      <a href="#">🏠 Dashboard</a>
      <a href="#">📝 All Notes</a>
      <a href="#">⭐ Favorites</a>
      <a href="#">🗑 Trash</a>
      <a href="#">⚙ Settings</a>

      <!-- SIGN OUT -->
      <div class="mt-auto">
        <hr>
        <a href="{% url 'user_auth:signout' %}" class="btn btn-danger w-100">
          🚪 Sign Out
        </a>
      </div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="col-md-9 col-lg-10 p-4">

      <h2 class="mb-3">Hello {{ first_name }}! Welcome Back 👋</h2>

      <!-- ADD NOTE FORM -->
      <div class="card p-3 mb-4 shadow-sm">
        <h5>Add New Note</h5>

        <form>
            {% csrf_token %}
          <div class="mb-3">
            <input type="text" class="form-control" placeholder="Note title">
          </div>

          <div class="mb-3">
            <textarea class="form-control" rows="4" placeholder="Write your note..."></textarea>
          </div>

          <button class="btn btn-success">Save Note</button>
        </form>
      </div>

      <!-- NOTES LIST -->
      <h5 class="mb-3">Your Notes</h5>

      <div class="card p-3 mb-2 shadow-sm">
        <h6>Meeting Ideas</h6>
        <p>Discuss project timeline and tasks with the team.</p>

        <div>
          <button class="btn btn-sm btn-warning">Edit</button>
          <button class="btn btn-sm btn-danger">Delete</button>
        </div>
      </div>

      <div class="card p-3 mb-2 shadow-sm">
        <h6>Shopping List</h6>
        <p>Milk, Bread, Eggs, Coffee</p>

        <div>
          <button class="btn btn-sm btn-warning">Edit</button>
          <button class="btn btn-sm btn-danger">Delete</button>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
